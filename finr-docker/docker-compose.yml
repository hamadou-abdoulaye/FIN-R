version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FIN-R — Docker Compose
# Lance toute la stack : React · Laravel · Python NLP · PostgreSQL · Reverb · Nginx
#
# Usage :
#   cp .env.example .env   # puis éditer les secrets
#   docker compose up --build
#
# Ports exposés :
#   http://localhost        → React (via Nginx)
#   http://localhost/api    → Laravel API
#   http://localhost:8001   → NLP service (interne, utile pour tests)
#   http://localhost:8080   → Reverb WebSockets
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de données PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-finr}
      POSTGRES_USER:     ${DB_USERNAME:-finr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finr_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-finr_user} -d ${DB_DATABASE:-finr}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finr_net

  # ── Laravel API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ../finr-api
      dockerfile: ../finr-docker/Dockerfile.api
    container_name: finr_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nlp:
        condition: service_healthy
    environment:
      APP_ENV:        ${APP_ENV:-production}
      APP_KEY:        ${APP_KEY}
      APP_URL:        ${APP_URL:-http://localhost}
      DB_CONNECTION:  pgsql
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_DATABASE:    ${DB_DATABASE:-finr}
      DB_USERNAME:    ${DB_USERNAME:-finr_user}
      DB_PASSWORD:    ${DB_PASSWORD:-finr_secret}
      JWT_SECRET:     ${JWT_SECRET}
      JWT_TTL:        1440
      NLP_SERVICE_URL: http://nlp:8001
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID:   ${REVERB_APP_ID:-finr-app}
      REVERB_APP_KEY:  ${REVERB_APP_KEY:-finr-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-finr-secret}
      REVERB_HOST:     reverb
      REVERB_PORT:     8080
      FRONTEND_URL:   ${FRONTEND_URL:-http://localhost}
    volumes:
      - api_storage:/var/www/html/storage
    networks:
      - finr_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Laravel Reverb (WebSockets) ───────────────────────────────────────────
  reverb:
    build:
      context: ../finr-api
      dockerfile: ../finr-docker/Dockerfile.api
    container_name: finr_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_KEY:           ${APP_KEY}
      DB_CONNECTION:     pgsql
      DB_HOST:           postgres
      DB_PORT:           5432
      DB_DATABASE:       ${DB_DATABASE:-finr}
      DB_USERNAME:       ${DB_USERNAME:-finr_user}
      DB_PASSWORD:       ${DB_PASSWORD:-finr_secret}
      REVERB_APP_ID:     ${REVERB_APP_ID:-finr-app}
      REVERB_APP_KEY:    ${REVERB_APP_KEY:-finr-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-finr-secret}
    ports:
      - "8080:8080"
    networks:
      - finr_net

  # ── Queue worker (traite les jobs async : NLP, emails…) ──────────────────
  worker:
    build:
      context: ../finr-api
      dockerfile: ../finr-docker/Dockerfile.api
    container_name: finr_worker
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_KEY:        ${APP_KEY}
      DB_CONNECTION:  pgsql
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_DATABASE:    ${DB_DATABASE:-finr}
      DB_USERNAME:    ${DB_USERNAME:-finr_user}
      DB_PASSWORD:    ${DB_PASSWORD:-finr_secret}
      JWT_SECRET:     ${JWT_SECRET}
      NLP_SERVICE_URL: http://nlp:8001
      BROADCAST_CONNECTION: reverb
      REVERB_HOST:    reverb
      REVERB_PORT:    8080
      REVERB_APP_KEY: ${REVERB_APP_KEY:-finr-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-finr-secret}
    networks:
      - finr_net

  # ── Microservice NLP Python ───────────────────────────────────────────────
  nlp:
    build:
      context: ../finr-nlp
      dockerfile: ../finr-docker/Dockerfile.nlp
    container_name: finr_nlp
    restart: unless-stopped
    environment:
      WORKERS: ${NLP_WORKERS:-2}
    networks:
      - finr_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── React frontend (build statique servi par Nginx) ───────────────────────
  frontend:
    build:
      context: ../finr-app
      dockerfile: ../finr-docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL:      ${APP_URL:-http://localhost}/api
        REACT_APP_REVERB_KEY:   ${REVERB_APP_KEY:-finr-key}
        REACT_APP_REVERB_HOST:  ${REVERB_HOST:-localhost}
        REACT_APP_REVERB_PORT:  ${REVERB_PORT:-8080}
    container_name: finr_frontend
    restart: unless-stopped
    networks:
      - finr_net

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: finr_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - finr_net

# ── Volumes & réseaux ─────────────────────────────────────────────────────
volumes:
  postgres_data:
  api_storage:

networks:
  finr_net:
    driver: bridge
