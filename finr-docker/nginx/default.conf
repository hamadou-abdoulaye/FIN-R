# nginx/default.conf
# Reverse proxy FIN-R :
#   /        → React frontend  (container:3000)
#   /api     → Laravel API     (container:8000)
#   /ws      → Reverb WS       (container:8080)

upstream frontend { server frontend:3000; }
upstream api      { server api:8000; }

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # ── React SPA ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Laravel API ────────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Laravel health check ───────────────────────────────────────────────
    location /up {
        proxy_pass http://api;
    }

    # ── Reverb WebSockets ──────────────────────────────────────────────────
    # Le client React se connecte directement sur :8080
    # Ce bloc est optionnel si on préfère passer par Nginx
    location /ws {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;  # keep WS alive 24h
    }
}
