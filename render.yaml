services:
  - type: web
    name: finr-api
    runtime: docker
    plan: free
    buildCommand: docker build -f finr-docker/Dockerfile.api -t finr-api .
    startCommand: docker run -p 10000:10000 finr-api
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://finr-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: aiven-db-host.aivencloud.com
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: finr_db
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        value: YOUR_AIVEN_PASSWORD
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: CORS_ALLOWED_ORIGINS
        value: https://finr-app.vercel.app
      - key: JWT_SECRET
        generateValue: true
