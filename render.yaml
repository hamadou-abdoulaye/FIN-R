services:
  - type: web
    name: finr-api
    runtime: php
    plan: free
    buildCommand: cd finr-api && composer install --no-dev --optimize-autoloader
    startCommand: cd finr-api && vendor/bin/heroku-php-nginx public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateBase64: true
      - key: APP_URL
        value: https://finr-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: finr-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: finr-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: finr-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: finr-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: CORS_ALLOWED_ORIGINS
        value: https://finr-app.vercel.app
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: finr-db
    plan: free
    databaseName: finr
    user: finr_user
